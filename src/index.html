<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DeepYomi</title>
  <link rel="stylesheet" href="output.css">
</head>
<body class="app-body">

  <div id="top-bar">
    <button id="snip-btn" title="Capture a region of your screen">Snip Screenshot</button>
  </div>

  <div id="drop-zone">
    <div id="prompt">
      <h2>Drop LN Page Here</h2>
      <p>Drag & drop your image scan, click to upload, or paste from clipboard</p>
    </div>
    <div id="file-name"></div>
    <div id="toolbar">
      <button class="tool active" id="mode-crop" title="Crop mode (drag to select)">Crop</button>
      <button class="tool" id="mode-pan" title="Pan mode (drag to move)">Pan</button>
      <button class="tool" id="zoom-out" title="Zoom out">&minus;</button>
      <span id="zoom-label">100%</span>
      <button class="tool" id="zoom-in" title="Zoom in">+</button>
      <button class="tool" id="zoom-fit" title="Fit to view">Fit</button>
    </div>
    <div id="preview-wrap">
      <img id="preview" alt="preview" />
      <div id="crop-box"></div>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display: none;" />
  </div>

  <div id="actions">
    <button id="extract-btn">Extract & Translate</button>
    <button id="clear-btn">Clear</button>
  </div>

  <div id="status">Ready</div>

  <script src="renderer.js"></script>
</body>
</html>
