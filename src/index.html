<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DeepYomi</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #1e1e2e;
      color: #cdd6f4;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #drop-zone {
      width: 80%;
      height: 60%;
      border: 3px dashed #89b4fa;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s ease;
      cursor: pointer;
    }
    #drop-zone.hover {
      background-color: #313244;
    }
    #drop-zone.has-image {
      padding: 8px;
    }
    #preview {
      display: none;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
    }
    #drop-zone.has-image #prompt { display: none; }
    #drop-zone.has-image #preview { display: block; }
    h2 { margin-bottom: 8px; color: #f5c2e7; }
    p { color: #a6adc8; font-size: 14px; text-align: center; padding: 0 20px;}
    #status {
      margin-top: 20px;
      font-weight: bold;
      color: #a6e3a1;
    }
  </style>
</head>
<body>

  <div id="drop-zone">
    <div id="prompt">
      <h2>Drop LN Page Here</h2>
      <p>Drag & drop your image scan, click to upload, or paste from clipboard</p>
    </div>
    <img id="preview" alt="preview" />
    <input type="file" id="file-input" accept="image/*" style="display: none;" />
  </div>

  <div id="status">Ready</div>

  <script src="renderer.js"></script>
</body>
</html>
