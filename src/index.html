<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DeepYomi</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #1e1e2e;
      color: #cdd6f4;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #drop-zone {
      width: 85%;
      height: 75%;
      border: 3px dashed #89b4fa;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s ease;
      cursor: pointer;
    }
    #drop-zone.hover {
      background-color: #313244;
    }
    #drop-zone.has-image {
      padding: 8px;
      cursor: default;
    }
    #preview-wrap {
      display: none;
      position: relative;
      line-height: 0;
    }
    #preview {
      display: block;
      max-width: 100%;
      max-height: 65vh;
      object-fit: contain;
      border-radius: 8px;
      user-select: none;
      -webkit-user-drag: none;
      cursor: crosshair;
    }
    #crop-box {
      display: none;
      position: absolute;
      border: 2px dashed #f9e2af;
      background: rgba(249, 226, 143, 0.15);
      pointer-events: none;
    }
    #drop-zone.has-image #prompt { display: none; }
    #drop-zone.has-image #preview-wrap { display: inline-block; }
    #prompt { text-align: center; }
    h2 { margin-bottom: 8px; color: #f5c2e7; }
    p { color: #a6adc8; font-size: 14px; text-align: center; padding: 0 20px;}
    #actions {
      display: none;
      gap: 10px;
      margin-top: 16px;
    }
    #actions.visible { display: flex; }
    button {
      font-size: 14px;
      font-weight: 600;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: filter 0.15s ease;
    }
    button:hover { filter: brightness(1.1); }
    #extract-btn { background: #89b4fa; color: #1e1e2e; }
    #clear-btn { background: #45475a; color: #cdd6f4; }
    #status {
      margin-top: 16px;
      font-weight: bold;
      color: #a6e3a1;
    }
  </style>
</head>
<body>

  <div id="drop-zone">
    <div id="prompt">
      <h2>Drop LN Page Here</h2>
      <p>Drag & drop your image scan, click to upload, or paste from clipboard</p>
    </div>
    <div id="preview-wrap">
      <img id="preview" alt="preview" />
      <div id="crop-box"></div>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display: none;" />
  </div>

  <div id="actions">
    <button id="extract-btn">Extract & Translate</button>
    <button id="clear-btn">Clear</button>
  </div>

  <div id="status">Ready</div>

  <script src="renderer.js"></script>
</body>
</html>
