<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DeepYomi</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #1e1e2e;
      color: #cdd6f4;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 14px;
      gap: 10px;
    }
    #drop-zone {
      position: relative;
      flex: 1;
      width: 100%;
      min-height: 0;
      border: 3px dashed #89b4fa;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background-color 0.2s ease;
      cursor: pointer;
    }
    #drop-zone.hover {
      background-color: #313244;
    }
    #drop-zone.has-image {
      cursor: default;
      border-style: solid;
      border-color: #313244;
    }
    /* Transformed canvas (translate + scale) holding the image + crop box */
    #preview-wrap {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: 0 0;
      line-height: 0;
      will-change: transform;
    }
    #preview {
      display: block;
      border-radius: 4px;
      user-select: none;
      -webkit-user-drag: none;
    }
    #crop-box {
      display: none;
      position: absolute;
      border: 2px dashed #f9e2af;
      background: rgba(249, 226, 143, 0.15);
      pointer-events: none;
    }
    /* Mode-aware cursors */
    #drop-zone.has-image.mode-crop #preview { cursor: crosshair; }
    #drop-zone.has-image.mode-pan #preview { cursor: grab; }
    #drop-zone.has-image.mode-pan.grabbing #preview { cursor: grabbing; }
    #drop-zone.has-image #prompt { display: none; }
    #drop-zone.has-image #preview-wrap { display: inline-block; }
    #prompt { text-align: center; }
    h2 { margin-bottom: 8px; color: #f5c2e7; }
    p { color: #a6adc8; font-size: 14px; text-align: center; padding: 0 20px;}

    /* Floating zoom / mode toolbar */
    #toolbar {
      display: none;
      position: absolute;
      top: 10px;
      right: 10px;
      gap: 6px;
      align-items: center;
      padding: 6px;
      background: rgba(30, 30, 46, 0.85);
      border: 1px solid #45475a;
      border-radius: 10px;
      backdrop-filter: blur(4px);
      z-index: 5;
    }
    #drop-zone.has-image #toolbar { display: flex; }

    /* Uploaded file name badge */
    #file-name {
      display: none;
      position: absolute;
      top: 10px;
      left: 10px;
      max-width: 60%;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
      color: #cdd6f4;
      background: rgba(30, 30, 46, 0.85);
      border: 1px solid #45475a;
      border-radius: 8px;
      backdrop-filter: blur(4px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      z-index: 5;
    }
    #drop-zone.has-image #file-name { display: block; }
    #toolbar button {
      padding: 6px 10px;
      font-size: 13px;
      min-width: 34px;
    }
    #toolbar .tool { background: #313244; color: #cdd6f4; }
    #toolbar .tool.active { background: #89b4fa; color: #1e1e2e; }
    #zoom-label {
      font-size: 12px;
      font-weight: 600;
      color: #a6adc8;
      min-width: 44px;
      text-align: center;
    }

    #actions {
      display: none;
      gap: 10px;
      justify-content: center;
    }
    #actions.visible { display: flex; }
    button {
      font-size: 14px;
      font-weight: 600;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: filter 0.15s ease;
    }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: 0.5; cursor: default; }
    #extract-btn { background: #89b4fa; color: #1e1e2e; }
    #clear-btn { background: #45475a; color: #cdd6f4; }
    #status {
      text-align: center;
      font-weight: bold;
      color: #a6e3a1;
    }
  </style>
</head>
<body>

  <div id="drop-zone">
    <div id="prompt">
      <h2>Drop LN Page Here</h2>
      <p>Drag & drop your image scan, click to upload, or paste from clipboard</p>
    </div>
    <div id="file-name"></div>
    <div id="toolbar">
      <button class="tool active" id="mode-crop" title="Crop mode (drag to select)">Crop</button>
      <button class="tool" id="mode-pan" title="Pan mode (drag to move)">Pan</button>
      <button class="tool" id="zoom-out" title="Zoom out">&minus;</button>
      <span id="zoom-label">100%</span>
      <button class="tool" id="zoom-in" title="Zoom in">+</button>
      <button class="tool" id="zoom-fit" title="Fit to view">Fit</button>
    </div>
    <div id="preview-wrap">
      <img id="preview" alt="preview" />
      <div id="crop-box"></div>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display: none;" />
  </div>

  <div id="actions">
    <button id="extract-btn">Extract & Translate</button>
    <button id="clear-btn">Clear</button>
  </div>

  <div id="status">Ready</div>

  <script src="renderer.js"></script>
</body>
</html>
